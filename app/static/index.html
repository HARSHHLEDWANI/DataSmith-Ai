<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>multimodal agent</title>
  <meta name="description"
        content="A small tool that reads text, images, PDFs and audio, plans the steps it needs, and answers in plain text." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='5'%20fill='%231A1916'/%3E%3Ctext%20x='16'%20y='22'%20font-size='19'%20fill='%23FAF9F6'%20text-anchor='middle'%20font-family='monospace'%3Ea%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <span class="app-name">multimodal agent</span>
      <span class="model" id="health">checking</span>
    </header>

    <main id="chat" class="chat">
      <div class="welcome" id="welcome">
        <p class="empty-line">Ask something, or attach files — images, PDFs, audio.</p>
        <ul class="examples">
          <li><button class="chip-example" data-fill="Summarize this">summarize a document</button></li>
          <li><button class="chip-example" data-fill="What is the sentiment of this text?">analyze sentiment of some text</button></li>
          <li><button class="chip-example" data-fill="Explain this code, find bugs, and give time complexity">explain code and find bugs</button></li>
          <li><button class="chip-example" data-fill="Fetch the YouTube link in this PDF and summarize the video">summarize a youtube link inside a pdf</button></li>
        </ul>
      </div>
    </main>

    <footer class="composer" id="dropzone">
      <div class="chips" id="fileChips"></div>
      <p class="composer-error" id="composerError" hidden></p>
      <div class="composer-row">
        <label class="attach" title="Attach files">
          <input type="file" id="fileInput" multiple
                 accept="image/*,application/pdf,audio/*,.txt,.md" hidden />
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Attach">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
          </svg>
        </label>
        <textarea id="messageInput" rows="1"
                  placeholder="Type a message, or answer the question above"></textarea>
        <button id="sendBtn" class="send">Send</button>
      </div>
      <p class="hint">max 25mb per file · drag &amp; drop works · text-only output</p>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
