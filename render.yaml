services:
  - type: web
    name: datasmith-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
